<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>

body{
  font-family:Segoe UI, sans-serif;
  background:#f6f6f6;
  padding:30px;
}

h2{
  margin-bottom:20px;
}

.cart-item{
  background:#fff;
  display:flex;
  align-items:center;
  margin-bottom:15px;
  padding:15px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.cart-item img{
  width:80px;
  margin-right:15px;
  border-radius:5px;
}

.item-details{
  flex:1;
}

.remove{
  background:red;
  color:white;
  border:none;
  padding:6px 12px;
  cursor:pointer;
  border-radius:4px;
}

.qty-controls{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.qty-btn{
  background:#f2f2f2;
  border:1px solid #ccc;
  padding:6px 14px;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
  border-radius:4px;
}

.qty-btn:hover{
  background:#ddd;
}

.qty-val{
  font-weight:bold;
  min-width:20px;
  text-align:center;
}

.total-box{
  background:#fff;
  padding:20px;
  margin-top:20px;
  border-radius:8px;
  font-size:20px;
  text-align:right;
  font-weight:bold;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.checkout{
  margin-top:15px;
  padding:12px 20px;
  background:linear-gradient(45deg,#8e2de2,#4a00e0);
  color:white;
  border:none;
  cursor:pointer;
  font-size:16px;
  float:right;
  border-radius:5px;
}

.checkout:hover{
  opacity:0.9;
}

.continue-btn{
  background:#444;
  color:white;
  border:none;
  padding:10px 18px;
  cursor:pointer;
  border-radius:5px;
  margin-top:20px;
}

</style>
</head>

<body>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total-box">
  Total: ₹<span id="totalPrice">0</span>
</div>

<button class="checkout" onclick="checkoutAll()">Checkout</button>

<br><br>

<button class="continue-btn" onclick="continueShopping()">
🛍 Continue Shopping
</button>

<script>

let email = localStorage.getItem("userEmail");

if (!email) {
  alert("Session expired, please login again");
  window.location.href = "Login.html";
}

async function loadCart(){

  const response = await fetch(`http://localhost:2000/api/cart/${email}`);
  const cart = await response.json();

  let container = document.getElementById("cartItems");
  container.innerHTML = "";

  let total = 0;

  if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty</p>";
    document.getElementById("totalPrice").innerText = "0.00";
    return;
  }

cart.forEach((item, index) => {
  total += item.price * item.quantity;

  container.innerHTML += `
    <div class="cart-item">
      <img src="${item.image}" alt="${item.name}">
      
      <div class="item-details">
        <h3 style="margin: 0 0 5px 0; color: #333;">${item.name}</h3>
        
        <p style="margin: 5px 0;">
          <strong>Price:</strong> ₹${item.price.toLocaleString()} <br>
          
          ${item.size 
            ? `<strong>Size:</strong> <span style="color:#4a00e0;font-weight:bold;">${item.size}</span>` 
            : `<strong>Category:</strong> Free Size`}
        </p>

        <div class="qty-controls">
          <strong>Qty:</strong>
          <button class="qty-btn" onclick="changeQty('${item._id}', -1)">-</button>
          <span class="qty-val">${item.quantity}</span>
          <button class="qty-btn" onclick="changeQty('${item._id}', 1)">+</button>
        </div>
      </div>

      <button class="remove" onclick="removeItem('${item._id}')">
        Remove
      </button>
    </div>`;
});

  document.getElementById("totalPrice").innerText = total.toFixed(2);
}

async function changeQty(id, change){

  const response = await fetch(`http://localhost:2000/api/cart/${email}`);
  const cart = await response.json();

  const item = cart.find(i => i._id === id);

  let newQty = item.quantity + change;

  if(newQty < 1) return;

  await fetch(`http://localhost:2000/api/cart/${id}`,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ quantity: newQty })
  });

  loadCart();
}

async function removeItem(id){

  await fetch(`http://localhost:2000/api/cart/${id}`,{
    method:"DELETE"
  });

  loadCart();
}

async function checkoutAll(){

  const response = await fetch(`http://localhost:2000/api/cart/${email}`);
  const cart = await response.json();

  if(cart.length === 0){
    alert("Your cart is empty!");
    return;
  }

  // ✅ DEBUG CHECK
  console.log("Cart Data Sent to Summary:", cart);

  // ✅ STORE PROPERLY
  localStorage.setItem("confirmedOrderItems", JSON.stringify(cart));

  // ❗ IMPORTANT: Remove Buy Now item to avoid conflict
  localStorage.removeItem("orderProduct");

  window.location.href = "Summary.html";
}

function continueShopping(){
  window.location.href="Homepage.html";
}

// Load when page opens
document.addEventListener("DOMContentLoaded", loadCart);

// Load when user comes back (back button fix)
window.addEventListener("pageshow", function (event) {
  if (event.persisted) {
    loadCart();
  }
});

</script>
</body>
</html>
