<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Details</title>

<style>
body{
  font-family:Segoe UI, sans-serif;
  background:#f6f6f6;
  padding:40px;
}

.product-container{
  max-width:900px;
  margin:auto;
  background:white;
  display:flex;
  gap:40px;
  padding:30px;
  border-radius:10px;
}

/* IMAGE SECTION */
.image-section{
  display:flex;
  flex-direction:column;
  align-items:flex-start;   /* Left align */
}

.product-container img{
  width:350px;
  border-radius:10px;
}

/* DETAILS */
.details h2{margin-bottom:10px;}
.details p{color:#555;margin-bottom:10px;}

.price{
  font-size:24px;
  color:#e91e63;
  font-weight:bold;
  margin:15px 0;
}

.size-box{
  margin:15px 0;
}

.size-box select{
  padding:8px;
  width:150px;
}

.buttons{
  margin-top:20px;
}


.cart-btn{
  background:#e2e612;
  color:#fff;
  padding:8px 16px;   /* Reduced padding */
  border:none;
  border-radius:4px;  /* Slightly smaller radius */
  font-size:14px;     /* Smaller text */
  cursor:pointer;
  margin-top:10px;    /* Reduced spacing */
}

.cart-btn:hover{
   opacity:0.9; 
}
/* BUY NOW – Pink/Orange Gradient */
.buy-btn{
  background: #38945b;
  color:#fff;
  padding:8px 16px;   /* Same compact padding */
  border:none;
  border-radius:4px;  /* Same border radius */
  font-size:14px;     /* Same font size */
  cursor:pointer;
  margin-top:10px;
}

.buy-btn:hover{
  opacity:0.9;  /* Smooth hover effect for gradient */
}
.back-btn{
  background:#555;
  color:#fff;
  padding:8px 16px;
  border:none;
  border-radius:4px;
  font-size:13px;
  cursor:pointer;
  margin-top:10px;
}

button{
  padding:10px 18px;
  margin-right:10px;
  border:none;
  cursor:pointer;
  border-radius:5px;
  font-size:15px;
}
</style>
</head>

<body>

<div class="product-container">

  <!-- IMAGE + BACK BUTTON -->
  <div class="image-section">
    <img id="pImage">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
  </div>
  
  <div class="details">
    <h2 id="pName"></h2>
    <p id="pDesc"></p>
    <div class="price">Rs <span id="pPrice"></span></div>

    <div class="size-box">
      <label>Select Size:</label><br>
      <select id="sizeSelect"></select>
    </div>

    <div class="buttons">
    <button class="cart-btn" onclick="addToCart()">🛒 Add to Cart</button>
    <button class="buy-btn" onclick="buyNow()">Buy Now</button>
    </div>
  </div>
</div>

<script>

// GET URL PARAMETERS
const urlParams = new URLSearchParams(window.location.search);

const name  = urlParams.get("name");
const desc  = urlParams.get("desc") || "Product description";
const price = urlParams.get("price") || "0";
const type  = (urlParams.get("type") || "footwear").toLowerCase();
const image = urlParams.get("image") || "";

// DISPLAY PRODUCT
document.getElementById("pName").innerText  = name;
document.getElementById("pDesc").innerText  = desc;
document.getElementById("pPrice").innerText = price;
document.getElementById("pImage").src       = image;


// SIZE LOGIC
const sizeSelect = document.getElementById("sizeSelect");
const sizeBox = document.querySelector(".size-box");

sizeSelect.innerHTML = "";

if(type === "footwear"){
  [4,5,6,7,8,9,10,11].forEach(s=>{
    sizeSelect.innerHTML += `<option value="${s}">${s}</option>`;
  });
}
else if(type === "clothing"){
  ["XS","S","M","L","XL","2XL","3XL"].forEach(s=>{
    sizeSelect.innerHTML += `<option value="${s}">${s}</option>`;
  });
}
else if(type === "kids"){
  ["2-3 Y","3-4 Y","4-5 Y","5-6 Y","6-7 Y","7-8 Y","8-9 Y","9-10 Y"]
  .forEach(s=>{
    sizeSelect.innerHTML += `<option value="${s}">${s}</option>`;
  });
}
else{
  sizeBox.style.display = "none";
}


// BACK BUTTON
function goBack(){
  window.history.back();
}


// ADD TO CART
async function addToCart() {

  const email = localStorage.getItem("userEmail");

  if (!email) {
    alert("Please login first");
    return;
  }

  let selectedSize = null;

  // ✅ Only take size if visible
  if (sizeBox.style.display !== "none") {
    selectedSize = sizeSelect.value;

    if (!selectedSize) {
      alert("Please select size");
      return;
    }
  }

  try {
    const response = await fetch("http://localhost:8080/api/Cart", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userEmail: email,
        name: name,
        price: parseFloat(price),
        image: image,
        size: selectedSize,   // ✅ null for saree
        quantity: 1
      })
    });

    if (response.ok) {
      alert("Added to cart");
    } else {
      alert("Error adding to cart");
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}
// BUY NOW
function buyNow(){

  const orderProduct = {
    name: name,
    price: parseFloat(price),
    image: image,
    size: sizeSelect.value,
    quantity: 1
  };

  localStorage.setItem("orderProduct", JSON.stringify(orderProduct));

  window.location.href = "Summary.html";

}

</script>
</body>
</html>
