<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>

<style>
body{
  font-family:Segoe UI;
  background:#f4f6f8;
  margin:0;
}

.container{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.order{
  border:1px solid #ddd;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.order-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-weight:bold;
}

.product{
  display:flex;
  gap:15px;
  margin:10px 0;
}

.product img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}

.total{
  text-align:right;
  font-weight:bold;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#333;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}

.clear-btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  background:#ff4d4d;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}

.clear-btn:hover{
  background:#cc0000;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Orders</h1>
  <div id="ordersContainer"></div>

  <button class="btn" onclick="goHome()">Continue Shopping</button>
  <button class="clear-btn" onclick="clearOrders()">🗑 Clear Order History</button>
</div>

<script>

// 🔥 BASE URL (Render backend)
const API_BASE = "https://footwear-and-clothing-website-production.up.railway.app";

// 🔐 LOGIN CHECK
const email = localStorage.getItem("userEmail");

if(!email){
  window.location.href = "Login.html";
}

// 📦 LOAD ORDERS
async function loadOrders(){

  const container = document.getElementById("ordersContainer");

  try{
    const response = await fetch(`${API_BASE}/api/orders/${email}`);

    if(!response.ok){
      throw new Error("API Error");
    }

    const orders = await response.json();

    if(!orders || orders.length === 0){
      container.innerHTML = "<p style='text-align:center;color:gray;'>No orders found yet.</p>";
      return;
    }

    container.innerHTML = "";

    orders.reverse().forEach(order => {

      let itemsHTML = "";

      // SAFE LOOP (prevents crash)
      (order.items || []).forEach(item => {

        itemsHTML += `
          <div class="product">
            <img src="${item.image || ''}">
            <div>
              <p><strong>${item.name || 'Item'}</strong></p>
              <p>Qty: ${item.quantity || 1} | Size: ${item.size || 'N/A'}</p>
              <p>₹${item.price || 0}</p>
            </div>
          </div>
        `;
      });

      let total = Number(order.totalAmount || 0).toFixed(2);

      let date = order.createdAt
        ? new Date(order.createdAt).toLocaleDateString("en-IN", {
            day: "2-digit",
            month: "short",
            year: "numeric"
          })
        : "N/A";

      container.innerHTML += `
        <div class="order">

          <div class="order-header">
            <span>Order ID: ${order.orderId || "N/A"}</span>
            <span>${date}</span>
          </div>

          ${itemsHTML}

          <div class="total">Total: ₹${total}</div>

        </div>
      `;
    });

  }catch(err){
    console.error(err);
    container.innerHTML = "<p style='color:red;text-align:center;'>Failed to load orders</p>";
  }
}

loadOrders();

// 🏠 HOME
function goHome(){
  window.location.href = "index.html";
}

// 🗑 CLEAR ORDERS
async function clearOrders(){

  if(!confirm("Are you sure you want to clear order history?")){
    return;
  }

  try{
    const response = await fetch(`${API_BASE}/api/orders/${email}`, {
      method: "DELETE"
    });

    if(response.ok){
      alert("Order history cleared");
      loadOrders();
    }else{
      alert("Failed to clear orders");
    }

  }catch(err){
    console.error(err);
    alert("Server error");
  }
}

</script>

</body>
</html>
