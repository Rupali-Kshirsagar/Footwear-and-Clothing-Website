<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>

<style>
body{
  font-family:Segoe UI;
  background:#f4f6f8;
  margin:0;
}

.container{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.order{
  border:1px solid #ddd;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.order-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-weight:bold;
}

.product{
  display:flex;
  gap:15px;
  margin:10px 0;
}

.product img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}

.total{
  text-align:right;
  font-weight:bold;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#333;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}
.clear-btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  background:#ff4d4d;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}

.clear-btn:hover{
  background:#cc0000;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Orders</h1>
  <div id="ordersContainer"></div>

  <button class="btn" onclick="goHome()">Continue Shopping</button>
  <button class="clear-btn" onclick="clearOrders()">🗑 Clear Order History</button>
</div>

<script>

// CHECK LOGIN
const email = localStorage.getItem("userEmail");

if(!email){
  window.location.href = "Login.html";
}

// LOAD ORDERS
async function loadOrders(){

  try{
    const response = await fetch(`http://localhost:2000/api/orders/${email}`);
    const orders = await response.json();

    const container = document.getElementById("ordersContainer");

    if(orders.length === 0){
      container.innerHTML = "<p>No orders found.</p>";
      return;
    }

    container.innerHTML = "";

 orders.reverse().forEach(order => {

  let itemsHTML = "";

  order.items.forEach(item => {
    itemsHTML += `
      <div class="product">
        <img src="${item.image}">
        <div>
          <p><strong>${item.name}</strong></p>
          <p>Qty: ${item.quantity} | Size: ${item.size || 'N/A'}</p>
          <p>₹${item.price}</p>
        </div>
      </div>
    `;
  });

  const formattedDate = order.createdAt
    ? new Date(order.createdAt).toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      })
    : "Date not available";

  container.innerHTML += `
    <div class="order">
      <div class="order-header">
        <span>Order ID: ${order.orderId}</span>
        <span>${formattedDate}</span>
      </div>

      ${itemsHTML}

      <div class="total">Total: ₹${Number(order.totalAmount).toFixed(2)}</div>
    </div>
  `;
});

  }catch(err){
    console.error(err);
    alert("Failed to load orders");
  }
}

loadOrders();
// NAVIGATION
function goHome(){
  window.location.href = "Homepage.html";
}
async function clearOrders(){

  if(!confirm("Are you sure you want to clear all order history?")){
    return;
  }

  try{
    const response = await fetch(`http://localhost:2000/api/orders/${email}`, {
      method: "DELETE"
    });

    const result = await response.json();

    if(response.ok){
      alert("Order history cleared");

      // reload page
      loadOrders();
    } else {
      alert(result.error || "Failed to clear history");
    }

  }catch(err){
    console.error(err);
    alert("Server error");
  }
}

</script>

</body>
</html>
