<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Women's Clothing</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
  background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
}

.back-btn {
  position: absolute;
  top: 5px;
  left: 10px;
  padding: 8px 16px;
  background-color: #5a5a5a; /* Dark gray background from image */
  color: white;              /* White text */
  border: none;
  border-radius: 6px;        /* Slightly rounded corners */
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  transition: background-color 0.3s ease;
  z-index: 1000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.back-btn:hover {
  background-color: #444444; /* Darker shade on hover */
}
.container{
  max-width:820px;
  margin:40px auto;
  padding:30px;
  background: rgba(255, 255, 255, 0.30);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius:16px;
  border: 1px solid rgba(255,255,255,0.4);
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

h2{text-align:center;margin-bottom:30px;}

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:24px;
  justify-content:center;
}

.card{
  width:220px;
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 15px rgba(0,0,0,.15);
  transition:.3s;
}
.card:hover{transform:translateY(-8px);}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.label{
  text-align:center;
  padding:12px;
  font-weight:600;
  color:#000;
}

a{text-decoration:none;}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="container">
  <h2>Women's Clothing</h2>

  <div class="grid">

    <!-- Paithani  -->
    <a href="Paithani-WC.html">
      <div class="card">
        <img src="image/p11.webp">
        <div class="label">Paithani</div>
      </div>
    </a>

    <!-- Kanjeevaram -->
    <a href="Kanjeevaram-WC.html">
      <div class="card">
        <img src="image/kan1.webp">
        <div class="label">Kanjeevaram</div>
      </div>
    </a>
    <!-- Banarasi -->
    <a href="Banarasi-WC.html">
      <div class="card">
        <img src="image/b1.webp">
        <div class="label">Banarasi</div>
      </div>
    </a>


    <!-- Chanderi -->
    <a href="Chanderi-WC.html">
      <div class="card">
        <img src="image/ch1.jpg">
        <div class="label">Chanderi</div>
      </div>
    </a>

  </div>
</div>

</body>
</html>
